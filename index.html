<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repository2Course Portal</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="header">
    <h1>Repository2Course Portal</h1>
    <p>自动跟踪每次新增的 Course，并展示最新清单。</p>
    <div class="meta">
      <span id="manifest-source"></span>
      <span id="manifest-updated"></span>
      <span id="manifest-count"></span>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <input id="q" type="search" placeholder="搜索课程名 / slug / 仓库 URL">
      <button id="reload">刷新</button>
    </section>
    <section>
      <ul id="course-list" class="course-list"></ul>
      <p id="empty" class="empty hidden">没有匹配的课程</p>
    </section>
  </main>

  <footer class="footer">
    <span>Portal for course tracking</span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
